<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout | MAXTECH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand text-white" href="index.html"><span class="brand-mark">MAX</span>TECH</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="fa-solid fa-user me-1"></i><span data-user-name>Account</span></a></li>
          <li class="nav-item"><a class="btn btn-outline-max ms-lg-2" href="cart.html"><i class="fa-solid fa-cart-shopping me-1"></i>Cart <span data-cart-count>0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-head">
    <div class="container">
      <p class="eyebrow mb-2">Final step</p>
      <h1 class="fw-bold">Checkout</h1>
      <p class="text-muted-max mb-0">Your order will be saved in browser storage after submission.</p>
    </div>
  </header>

  <main class="section-pad">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="panel p-4">
            <h2 class="h4 mb-4">Billing and Delivery</h2>
            <form data-checkout-form>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label" for="name">Full name</label>
                  <input class="form-control" id="name" name="name" type="text" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" name="email" type="email" required>
                </div>
                <div class="col-12">
                  <label class="form-label" for="address">Delivery address</label>
                  <input class="form-control" id="address" name="address" type="text" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="phone">Phone</label>
                  <input class="form-control" id="phone" name="phone" type="tel" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="payment">Payment method</label>
                  <select class="form-select" id="payment" name="payment" required>
                    <option value="Cash on delivery">Cash on delivery</option>
                    <option value="Bank transfer">Bank transfer</option>
                    <option value="Credit card">Credit card</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label" for="note">Order note</label>
                  <textarea class="form-control" id="note" name="note" rows="4" placeholder="Optional"></textarea>
                </div>
                <div class="col-12">
                  <button class="btn btn-max" type="submit"><i class="fa-solid fa-lock me-2"></i>Place Order</button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <div class="col-lg-5" data-checkout-summary></div>
      </div>
    </div>
  </main>

  <footer class="footer py-4">
    <div class="container d-md-flex justify-content-between align-items-center">
      <p class="mb-md-0 small text-muted-max">MAXTECH · support@maxtech.com · Facebook · Twitter · Zalo</p>
      <a class="btn btn-outline-max btn-sm" href="cart.html">Back to Cart</a>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
