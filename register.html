<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | MAXTECH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand text-white" href="index.html"><span class="brand-mark">MAX</span>TECH</a>
      <div class="ms-auto"><a class="btn btn-outline-max" href="login.html"><i class="fa-solid fa-user me-1"></i>Login</a></div>
    </div>
  </nav>
  <main class="section-pad">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
          <div class="auth-card p-4 p-lg-5">
            <p class="eyebrow mb-2">Create account</p>
            <h1 class="h2 fw-bold mb-4">Join MAXTECH</h1>
            <div data-auth-message class="d-none"></div>
            <form data-register-form>
              <div class="mb-3">
                <label class="form-label" for="name">Full name</label>
                <input class="form-control" id="name" name="name" type="text" required placeholder="Your name">
              </div>
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" required placeholder="you@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label" for="phone">Phone</label>
                <input class="form-control" id="phone" name="phone" type="tel" placeholder="+1 555 0123">
              </div>
              <div class="mb-3">
                <label class="form-label" for="address">Address</label>
                <input class="form-control" id="address" name="address" type="text" placeholder="Delivery address">
              </div>
              <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" minlength="6" required placeholder="At least 6 characters">
              </div>
              <button class="btn btn-max w-100" type="submit"><i class="fa-solid fa-user-plus me-2"></i>Register</button>
            </form>
            <p class="text-muted-max mt-4 mb-0">Already have an account? <a class="brand-mark fw-bold" href="login.html">Login</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
