<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | MAXTECH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand text-white" href="index.html"><span class="brand-mark">MAX</span>TECH</a>
      <div class="ms-auto"><a class="btn btn-outline-max" href="cart.html"><i class="fa-solid fa-cart-shopping me-1"></i>Cart <span data-cart-count>0</span></a></div>
    </div>
  </nav>
  <main class="section-pad">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
          <div class="auth-card p-4 p-lg-5">
            <p class="eyebrow mb-2">Welcome back</p>
            <h1 class="h2 fw-bold mb-4">Login to MAXTECH</h1>
            <div data-auth-message class="d-none"></div>
            <form data-login-form>
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" required placeholder="you@example.com">
              </div>
              <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" required placeholder="Enter your password">
              </div>
              <button class="btn btn-max w-100" type="submit"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</button>
            </form>
            <p class="text-muted-max mt-4 mb-0">New customer? <a class="brand-mark fw-bold" href="register.html">Create an account</a></p>
            <p class="small text-muted-max mt-3 mb-0">Admin login: admin@maxtech.com / admin123</p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
