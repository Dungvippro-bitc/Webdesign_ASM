<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products | MAXTECH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand text-white" href="index.html"><span class="brand-mark">MAX</span>TECH</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="fa-solid fa-user me-1"></i><span data-user-name>Account</span></a></li>
          <li class="nav-item"><a class="btn btn-outline-max ms-lg-2" href="cart.html"><i class="fa-solid fa-cart-shopping me-1"></i>Cart <span data-cart-count>0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-head">
    <div class="container">
      <p class="eyebrow mb-2">MAXTECH catalog</p>
      <h1 class="fw-bold">Products</h1>
      <p class="text-muted-max mb-0">Search, sort, and filter our expanding range of technology products stored in the browser.</p>
    </div>
  </header>

  <main class="section-pad">
    <div class="container">
      <div class="catalog-categories mb-4" data-category-tabs aria-label="Popular product categories">
        <button class="category-tab active" type="button" data-category-tab="All"><i class="fa-solid fa-border-all" aria-hidden="true"></i><span>All</span></button>
        <button class="category-tab" type="button" data-category-tab="Smartphones"><i class="fa-solid fa-mobile-screen-button" aria-hidden="true"></i><span>Smartphones</span></button>
        <button class="category-tab" type="button" data-category-tab="Headphones"><i class="fa-solid fa-headphones" aria-hidden="true"></i><span>Headphones</span></button>
        <button class="category-tab" type="button" data-category-tab="Laptops"><i class="fa-solid fa-laptop" aria-hidden="true"></i><span>Laptops</span></button>
        <button class="category-tab" type="button" data-category-tab="Monitors"><i class="fa-solid fa-display" aria-hidden="true"></i><span>Monitors</span></button>
        <button class="category-tab" type="button" data-category-tab="Gaming"><i class="fa-solid fa-gamepad" aria-hidden="true"></i><span>Gaming</span></button>
      </div>
      <div class="panel p-3 p-lg-4 mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-lg-4">
            <label class="form-label" for="search">Search products</label>
            <input class="form-control" id="search" data-search type="search" placeholder="Search name, category, or brand">
          </div>
          <div class="col-md-6 col-lg-2">
            <label class="form-label" for="category">Category</label>
            <select class="form-select" id="category" data-category></select>
          </div>
          <div class="col-md-6 col-lg-2">
            <label class="form-label" for="brand">Brand</label>
            <select class="form-select" id="brand" data-brand></select>
          </div>
          <div class="col-md-6 col-lg-2">
            <label class="form-label" for="sort">Sort by</label>
            <select class="form-select" id="sort" data-sort>
              <option value="default">Featured</option>
              <option value="best-selling">Best selling</option>
              <option value="price-low">Price: Low to high</option>
              <option value="price-high">Price: High to low</option>
            </select>
          </div>
          <div class="col-lg-2 filter-count">
            <span class="small text-muted-max" data-product-count></span>
          </div>
        </div>
      </div>
      <div class="row g-4" data-product-grid></div>
      <nav class="catalog-pagination mt-5" data-product-pagination aria-label="Product catalog pages"></nav>
    </div>
  </main>

  <footer class="footer py-4 mt-auto" data-site-footer></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
