<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products | MAXTECH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand text-white" href="index.html"><span class="brand-mark">MAX</span>TECH</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="fa-solid fa-user me-1"></i><span data-user-name>Account</span></a></li>
          <li class="nav-item"><a class="btn btn-outline-max ms-lg-2" href="cart.html"><i class="fa-solid fa-cart-shopping me-1"></i>Cart <span data-cart-count>0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-head">
    <div class="container">
      <p class="eyebrow mb-2">MAXTECH catalog</p>
      <h1 class="fw-bold">Products</h1>
      <p class="text-muted-max mb-0">Search, sort, and filter 10 technology products stored in the browser.</p>
    </div>
  </header>

  <main class="section-pad">
    <div class="container">
      <div class="panel p-3 p-lg-4 mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-lg-5">
            <label class="form-label" for="search">Search products</label>
            <input class="form-control" id="search" data-search type="search" placeholder="Search by name or category">
          </div>
          <div class="col-md-6 col-lg-3">
            <label class="form-label" for="category">Category</label>
            <select class="form-select" id="category" data-category></select>
          </div>
          <div class="col-md-6 col-lg-3">
            <label class="form-label" for="sort">Sort by</label>
            <select class="form-select" id="sort" data-sort>
              <option value="default">Featured</option>
              <option value="best-selling">Best selling</option>
              <option value="price-low">Price: Low to high</option>
              <option value="price-high">Price: High to low</option>
            </select>
          </div>
          <div class="col-lg-1 text-lg-end">
            <span class="small text-muted-max" data-product-count></span>
          </div>
        </div>
      </div>
      <div class="row g-4" data-product-grid></div>
    </div>
  </main>

  <footer class="footer py-4">
    <div class="container d-md-flex justify-content-between align-items-center">
      <p class="mb-md-0 small text-muted-max">support@maxtech.com · +1 555 0188 · Facebook · Twitter · Zalo</p>
      <div><a class="social-link" href="#"><i class="fa-brands fa-facebook-f"></i></a><a class="social-link" href="#"><i class="fa-brands fa-x-twitter"></i></a><a class="social-link" href="#"><i class="fa-solid fa-comment-dots"></i></a></div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
