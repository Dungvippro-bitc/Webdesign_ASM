<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopping Cart | MAXTECH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand text-white" href="index.html"><span class="brand-mark">MAX</span>TECH</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="fa-solid fa-user me-1"></i><span data-user-name>Account</span></a></li>
          <li class="nav-item"><a class="btn btn-outline-max ms-lg-2 active" href="cart.html"><i class="fa-solid fa-cart-shopping me-1"></i>Cart <span data-cart-count>0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-head">
    <div class="container">
      <p class="eyebrow mb-2">Review order</p>
      <h1 class="fw-bold">Shopping Cart</h1>
      <p class="text-muted-max mb-0">Update quantities, remove products, and continue to checkout.</p>
    </div>
  </header>

  <main class="section-pad">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-8" data-cart></div>
        <div class="col-lg-4" data-cart-summary></div>
      </div>
    </div>
  </main>

  <footer class="footer py-4 mt-auto" data-site-footer></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
